version: 0.2

env:
  variables:
    COVERAGE_THRESHOLD: "70"
  parameter-store:
    GITHUB_TOKEN: /devsu-app/github-token

phases:
  pre_build:
    commands:
      - echo "Pre-build phase started on $(date)"
      - echo "Installing dependencies..."
      - npm ci
      
      - echo "Running unit tests..."
      - npm test -- --coverage --coverageReporters=text --coverageReporters=json-summary
      
      - echo "Checking code coverage threshold..."
      - |
        COVERAGE=$(node -pe "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.lines.pct")
        echo "Code coverage: ${COVERAGE}%"
        if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
          echo "ERROR: Code coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
          exit 1
        fi
        echo "Code coverage check passed"
      
      - echo "Running ESLint..."
      - npm run lint || echo "ESLint check completed"
      
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      
  build:
    commands:
      - echo "Build phase started on $(date)"
      - echo "Building Docker image..."
      - docker build -t $ECR_REPOSITORY_URI:$IMAGE_TAG .
      - docker tag $ECR_REPOSITORY_URI:$IMAGE_TAG $ECR_REPOSITORY_URI:latest
      
      - echo "Installing Trivy..."
      - |
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | tee -a /etc/apt/sources.list.d/trivy.list
        apt-get update
        apt-get install -y trivy
      
      - echo "Scanning Docker image for vulnerabilities..."
      - trivy image --exit-code 0 --severity LOW,MEDIUM --format table $ECR_REPOSITORY_URI:$IMAGE_TAG
      - trivy image --exit-code 1 --severity HIGH,CRITICAL --format table $ECR_REPOSITORY_URI:$IMAGE_TAG
      
  post_build:
    commands:
      - echo "Post-build phase started on $(date)"
      - echo "Vulnerability scan passed, pushing image to ECR..."
      - docker push $ECR_REPOSITORY_URI:$IMAGE_TAG
      - docker push $ECR_REPOSITORY_URI:latest
      
      - echo "Updating Kubernetes deployment manifest..."
      - sed -i "s|\${AWS_ACCOUNT_ID}|$AWS_ACCOUNT_ID|g" k8s/app.yaml
      - sed -i "s|\${AWS_REGION}|$AWS_DEFAULT_REGION|g" k8s/app.yaml
      - sed -i "s|devsu-app:latest|devsu-app:$IMAGE_TAG|g" k8s/app.yaml
      
      - echo "Configuring kubectl for EKS..."
      - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_DEFAULT_REGION
      
      - echo "Applying Kubernetes manifests to cluster..."
      - kubectl apply -f k8s/00-namespace.yaml
      - kubectl apply -f k8s/app-config.yaml
      - kubectl apply -f k8s/app.yaml
      
      - echo "Checking deployment status..."
      - kubectl rollout status deployment/devsu-app -n devsu-app --timeout=5m
      
      - echo "Build completed successfully on $(date)"

artifacts:
  files:
    - k8s/**/*
    - coverage/**/*
    - buildspec.yml
  name: devsu-app-build-artifacts

cache:
  paths:
    - 'node_modules/**/*'
